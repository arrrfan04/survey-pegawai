<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Pemilih - Pemilihan Pegawai</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
 </head>
 <body class="h-full bg-gradient-to-br from-blue-300 via-blue-200 to-gray-300 m-0 p-0">
  <div id="loginView" class="h-full w-full flex flex-col items-center justify-center p-4 bg-gradient-to-br from-blue-300 via-blue-200 to-gray-300 relative">
   <div class="w-full max-w-md relative animate-slide-in">
    <div class="text-center mb-8">
     <div class="bg-gradient-to-br from-blue-600 to-indigo-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
      <span class="text-3xl">🗳️</span>
     </div>
     <h1 id="loginTitle" class="text-3xl font-bold text-gray-900 mb-2">Pemilihan Pegawai</h1>
     <p id="companyNameLogin" class="text-gray-500">LAPAS PEREMPUAN KELAS III TERNATE</p>
    </div>
    <div class="bg-white rounded-2xl shadow-lg p-8 space-y-6">
     <div>
      <label for="username" class="block text-sm font-semibold text-gray-700 mb-2">Username</label> <input type="text" id="username" placeholder="Masukkan username" class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 transition">
     </div>
     <div>
      <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">Password</label> <input type="password" id="password" placeholder="Masukkan password" class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 transition">
     </div>
     <div id="loginError" class="hidden bg-red-50 border-l-4 border-red-500 p-4 rounded text-red-700 text-sm"></div><button id="loginBtn" type="button" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-semibold py-3 rounded-lg transition">Masuk</button> <button type="button" id="closeLoginBtn" class="w-full bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold py-3 rounded-lg transition">← Kembali</button>
    </div>
   </div>
  </div>
  <script src="app.js"></script>
 </body>
</html>
